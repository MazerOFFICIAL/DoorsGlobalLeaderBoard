<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOORS Pro Leaderboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #050505;
      --bg-panel: #0a0a0c;
      --border-color: rgba(255, 255, 255, 0.08);
      --gold: #FFD700;
      --silver: #E3E4E5;
      --bronze: #CD7F32;
      --accent: #00F0FF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg-dark);
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background-image: radial-gradient(circle at 50% 0%, rgba(0, 240, 255, 0.03) 0%, transparent 50%);
    }

    h1, h2, h3, .rank-number {
      font-family: 'Rajdhani', sans-serif;
    }

    .glass-nav {
      background: rgba(5, 5, 5, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .search-box, .sort-box {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      color: white;
      transition: all 0.2s ease;
    }

    .search-box:focus, .sort-box:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(0, 240, 255, 0.02);
    }

    /* Podium Styles */
    .podium-container {
      display: grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap: 1.5rem;
      align-items: flex-end;
      margin-bottom: 3rem;
      padding-top: 2rem;
    }

    .podium-card {
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
      position: relative;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }

    .podium-card:hover {
      transform: translateY(-5px);
    }

    .podium-1 {
      border-color: rgba(255, 215, 0, 0.3);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.05);
      height: 100%;
    }
    
    .podium-1 .rank-badge { background: linear-gradient(135deg, #FFDF00, #D4AF37); color: #000; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
    .podium-2 .rank-badge { background: linear-gradient(135deg, #F8F9FA, #B0B3B8); color: #000; }
    .podium-3 .rank-badge { background: linear-gradient(135deg, #E69D5B, #A0522D); color: #fff; }

    .rank-badge {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 700;
      font-family: 'Rajdhani', sans-serif;
      margin-top: -45px;
      margin-bottom: 1rem;
      border: 4px solid var(--bg-dark);
    }

    /* List Styles */
    .list-header {
      display: grid;
      grid-template-columns: 80px 2fr 1fr 1fr 1fr 40px;
      padding: 1rem 1.5rem;
      color: #8b949e;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border-color);
    }

    .list-row {
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      margin-bottom: 0.75rem;
      transition: border-color 0.2s ease;
      overflow: hidden;
    }

    .list-row:hover {
      border-color: rgba(255, 255, 255, 0.2);
    }

    .list-row-main {
      display: grid;
      grid-template-columns: 80px 2fr 1fr 1fr 1fr 40px;
      padding: 1.25rem 1.5rem;
      align-items: center;
      cursor: pointer;
    }

    .list-rank {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #6e7681;
    }

    .stat-value {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #8b949e;
    }

    /* Expandable Details */
    .details-panel {
      max-height: 0;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(0, 0, 0, 0.2);
      border-top: 1px solid transparent;
    }

    .list-row.active .details-panel, .podium-card.active .details-panel {
      max-height: 800px;
      opacity: 1;
      border-top-color: var(--border-color);
      padding: 1.5rem;
    }

    .podium-card .details-panel {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      z-index: 10;
      margin-top: 0.5rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      text-align: left;
    }

    .grid-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 1rem;
    }

    .micro-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.75rem;
    }

    .micro-value {
      color: var(--accent);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .micro-label {
      font-size: 0.65rem;
      color: #8b949e;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .section-tag {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.25rem 0.75rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 100px;
      color: #e2e8f0;
      margin: 1.5rem 0 0.75rem 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .chevron {
      transition: transform 0.3s ease;
      color: #8b949e;
    }

    .list-row.active .chevron {
      transform: rotate(180deg);
    }

    @media (max-width: 768px) {
      .podium-container {
        grid-template-columns: 1fr;
        gap: 3rem;
      }
      .podium-1 { order: -1; }
      .list-header { display: none; }
      .list-row-main {
        grid-template-columns: 50px 1fr 40px;
        gap: 1rem;
      }
      .hide-mobile { display: none; }
    }
  </style>
</head>
<body>

  <nav class="glass-nav py-4">
    <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center text-white font-bold text-xl font-['Rajdhani']">D</div>
        <div>
          <h1 class="text-2xl font-bold tracking-wide text-white leading-tight">DOORS PRO</h1>
          <p class="text-xs text-cyan-400 tracking-widest uppercase">Global Intel Network</p>
        </div>
      </div>
      
      <div class="flex w-full md:w-auto gap-3">
        <input type="text" id="searchInput" class="search-box px-4 py-2 rounded-lg w-full md:w-64 text-sm" placeholder="Search operative...">
        <select id="sortSelect" class="sort-box px-4 py-2 rounded-lg text-sm cursor-pointer">
          <option value="overall">Rating</option>
          <option value="wins">Wins</option>
          <option value="hours">Hours</option>
          <option value="deaths">Deaths</option>
          <option value="knobs">Knobs</option>
        </select>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 py-10">
    <div id="podiumArea" class="podium-container"></div>
    
    <div id="listArea" class="mt-8">
      <div class="list-header hide-mobile">
        <div>Rank</div>
        <div>Operative</div>
        <div>Overall Rating</div>
        <div>Total Wins</div>
        <div>Hours Logged</div>
        <div></div>
      </div>
      <div id="playersList"></div>
    </div>
  </main>

  <script src="playersdata.js"></script>
  <script>
    function fn(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return n.toLocaleString();
    }

    function calc(p) {
      const m = {
        w: Math.max(...playersData.map(x => x.totalWins || 0)),
        k: Math.max(...playersData.map(x => x.totalKnobs || 0)),
        d: Math.max(...playersData.map(x => x.totalDeaths || 0)),
        h: Math.max(...playersData.map(x => x.hoursPlayed || 0)),
        b: Math.max(...playersData.map(x => (x.doorsTotal || 0) + (x.hdBadges || 0) + (x.ghostHuntBadges || 0) + (x.findApplesBadges || 0))),
        r: Math.max(...playersData.map(x => x.totalRevives || 0))
      };
      const s = {
        w: ((p.totalWins || 0) / (m.w || 1)) * 100,
        k: ((p.totalKnobs || 0) / (m.k || 1)) * 100,
        d: ((p.totalDeaths || 0) / (m.d || 1)) * 100,
        h: ((p.hoursPlayed || 0) / (m.h || 1)) * 100,
        b: (((p.doorsTotal || 0) + (p.hdBadges || 0) + (p.ghostHuntBadges || 0) + (p.findApplesBadges || 0)) / (m.b || 1)) * 100,
        r: ((p.totalRevives || 0) / (m.r || 1)) * 100
      };
      let o = (s.w * 0.25) + (s.k * 0.20) + (s.d * 0.15) + (s.h * 0.15) + (s.b * 0.15) + (s.r * 0.10);
      return Math.min(100, o);
    }

    function getDet(p) {
      const tb = (p.doorsTotal || 0) + (p.hdBadges || 0) + (p.ghostHuntBadges || 0) + (p.findApplesBadges || 0);
      return `
        <div class="details-panel">
          <div class="grid-stats">
            <div class="micro-card"><div class="micro-value">${fn(p.totalKnobs)}</div><div class="micro-label">Total Knobs</div></div>
            <div class="micro-card"><div class="micro-value">${fn(p.totalRevives)}</div><div class="micro-label">Revives</div></div>
            <div class="micro-card"><div class="micro-value">${fn(p.daysActive)}</div><div class="micro-label">Days Active</div></div>
            <div class="micro-card"><div class="micro-value">${fn(tb)}</div><div class="micro-label">Total Badges</div></div>
            <div class="micro-card"><div class="micro-value">${p.completionPercentage || 0}%</div><div class="micro-label">Completion</div></div>
          </div>
          
          <div class="section-tag">Core Floors</div>
          <div class="grid-stats">
            <div class="micro-card"><div class="micro-value">${fn(p.winsHotel || 0)}</div><div class="micro-label">Hotel</div></div>
            <div class="micro-card"><div class="micro-value">${fn(p.winsMines || 0)}</div><div class="micro-label">Mines</div></div>
            <div class="micro-card"><div class="micro-value">${fn(p.winsRooms || 0)}</div><div class="micro-label">Rooms</div></div>
            <div class="micro-card"><div class="micro-value">${fn(p.winsBackdoor || 0)}</div><div class="micro-label">Backdoor</div></div>
          </div>

          <div class="section-tag">Special Operations</div>
          <div class="grid-stats">
            <div class="micro-card"><div class="micro-value">${fn(p.winsSuperHardMode || 0)}</div><div class="micro-label">Super Hard</div></div>
            <div class="micro-card"><div class="micro-value">${fn(p.winsHotelHell || 0)}</div><div class="micro-label">Hotel Hell</div></div>
            <div class="micro-card"><div class="micro-value">${fn(p.winsRetroMode || 0)}</div><div class="micro-label">Retro</div></div>
            <div class="micro-card"><div class="micro-value">${fn(p.winsMatchmaking || 0)}</div><div class="micro-label">Ranked</div></div>
          </div>
        </div>
      `;
    }

    function rPod(pArr) {
      const c = document.getElementById('podiumArea');
      c.innerHTML = '';
      if(pArr.length === 0) return;
      
      const ord = [1, 0, 2];
      ord.forEach(i => {
        if(!pArr[i]) return;
        const p = pArr[i];
        const r = i + 1;
        const o = calc(p);
        
        const d = document.createElement('div');
        d.className = `podium-card podium-${r}`;
        d.innerHTML = `
          <div class="rank-badge">${r}</div>
          <h2 class="text-xl font-bold text-white mb-1">${p.name}</h2>
          <div class="text-xs text-cyan-400 mb-4 tracking-wider uppercase">${p.region || 'Unknown'}</div>
          
          <div class="w-full flex justify-between px-4 mb-2">
            <span class="stat-label">Rating</span>
            <span class="stat-value text-white">${o.toFixed(1)}</span>
          </div>
          <div class="w-full flex justify-between px-4 mb-2">
            <span class="stat-label">Wins</span>
            <span class="stat-value text-white">${fn(p.totalWins)}</span>
          </div>
          <div class="w-full flex justify-between px-4">
            <span class="stat-label">Deaths</span>
            <span class="stat-value text-white">${fn(p.totalDeaths)}</span>
          </div>
          ${getDet(p)}
        `;
        d.addEventListener('click', function() {
          const wasActive = this.classList.contains('active');
          document.querySelectorAll('.podium-card').forEach(el => el.classList.remove('active'));
          if(!wasActive) this.classList.add('active');
        });
        c.appendChild(d);
      });
    }

    function rList(pArr, stI) {
      const c = document.getElementById('playersList');
      c.innerHTML = '';
      if(pArr.length === 0) {
        c.innerHTML = '<div class="text-center py-10 text-gray-500">No operatives found matching the criteria.</div>';
        return;
      }

      pArr.forEach((p, i) => {
        const r = stI + i + 1;
        const o = calc(p);
        const d = document.createElement('div');
        d.className = 'list-row';
        d.innerHTML = `
          <div class="list-row-main">
            <div class="list-rank">#${r}</div>
            <div>
              <div class="text-white font-bold text-lg">${p.name}</div>
              <div class="text-xs text-gray-500 uppercase flex gap-2">
                <span>${p.region || 'UNK'}</span>
                <span class="${p.status === 'Online' ? 'text-green-500' : 'text-gray-600'}">• ${p.status}</span>
              </div>
            </div>
            <div class="hide-mobile">
              <div class="stat-value text-cyan-400">${o.toFixed(1)}</div>
            </div>
            <div class="hide-mobile">
              <div class="stat-value text-white">${fn(p.totalWins)}</div>
            </div>
            <div class="hide-mobile">
              <div class="stat-value text-white">${fn(p.hoursPlayed)}</div>
            </div>
            <div class="text-right">
              <svg class="chevron w-5 h-5 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>
          </div>
          ${getDet(p)}
        `;
        d.querySelector('.list-row-main').addEventListener('click', function() {
          d.classList.toggle('active');
        });
        c.appendChild(d);
      });
    }

    function render(data, sort) {
      let s = [...data];
      if (sort === 'overall') s.sort((a, b) => calc(b) - calc(a));
      else if (sort === 'wins') s.sort((a, b) => (b.totalWins || 0) - (a.totalWins || 0));
      else if (sort === 'hours') s.sort((a, b) => (b.hoursPlayed || 0) - (a.hoursPlayed || 0));
      else if (sort === 'deaths') s.sort((a, b) => (b.totalDeaths || 0) - (a.totalDeaths || 0));
      else if (sort === 'knobs') s.sort((a, b) => (b.totalKnobs || 0) - (a.totalKnobs || 0));

      const isSearchActive = document.getElementById('searchInput').value.length > 0;

      if (!isSearchActive && s.length >= 3 && (sort === 'overall' || sort === 'wins')) {
        document.getElementById('podiumArea').style.display = 'grid';
        rPod(s.slice(0, 3));
        rList(s.slice(3), 3);
      } else {
        document.getElementById('podiumArea').style.display = 'none';
        rList(s, 0);
      }
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      const f = playersData.filter(p => p.name.toLowerCase().includes(q));
      render(f, document.getElementById('sortSelect').value);
    });

    document.getElementById('sortSelect').addEventListener('change', (e) => {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const f = playersData.filter(p => p.name.toLowerCase().includes(q));
      render(f, e.target.value);
    });

    render(playersData, 'overall');
  </script>
</body>
</html>

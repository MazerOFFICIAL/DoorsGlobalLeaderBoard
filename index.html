<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Universal Asset Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        input, button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            outline: none;
            font-size: 15px;
            transition: all 0.2s ease;
        }
        input {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input:focus {
            border-color: #10b981;
            background: rgba(255, 255, 255, 0.08);
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        button {
            background: #10b981;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover:not(:disabled) {
            background: #059669;
            transform: translateY(-1px);
        }
        button:active:not(:disabled) {
            transform: translateY(1px);
        }
        button:disabled {
            background: #475569;
            cursor: not-allowed;
            opacity: 0.7;
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #94a3b8;
            min-height: 20px;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Roblox Universal Downloader</h1>
        <div class="input-group">
            <input type="text" id="assetId" placeholder="Введите ID любого ассета">
        </div>
        <button id="downloadBtn">Скачать</button>
        <div id="status"></div>
    </div>

    <script>
        const downloadBtn = document.getElementById('downloadBtn');
        const assetIdInput = document.getElementById('assetId');
        const statusDiv = document.getElementById('status');

        async function analyzeBlob(blob) {
            const slice = blob.slice(0, 8);
            const buffer = await slice.arrayBuffer();
            const view = new DataView(buffer);
            const byteLength = buffer.byteLength;

            let ext = 'bin';
            let isXml = false;

            if (byteLength >= 4) {
                const h32 = view.getUint32(0, false);
                if (h32 === 0x89504E47) return { ext: 'png', isXml: false };
                if (h32 === 0x4F676753) return { ext: 'ogg', isXml: false };
                if (h32 === 0x52494646) return { ext: 'wav', isXml: false };
                if (h32 === 0x3C726F62) {
                    isXml = true;
                    ext = 'rbxmx';
                }
            }

            if (byteLength >= 8) {
                const h64_1 = view.getUint32(0, false);
                const h64_2 = view.getUint32(4, false);
                if (h64_1 === 0x3C726F62 && h64_2 === 0x6C6F7821) {
                    return { ext: 'rbxm', isXml: false };
                }
            }

            if (byteLength >= 3) {
                const h24 = (view.getUint16(0, false) << 8) | view.getUint8(2);
                if (h24 === 0x494433) return { ext: 'mp3', isXml: false };
                if ((view.getUint32(0, false) & 0xFFFFFF00) === 0xFFD8FF00) return { ext: 'jpg', isXml: false };
            }

            if (byteLength >= 2) {
                const h16 = view.getUint16(0, false);
                if (h16 === 0xFFFB || h16 === 0xFFF3 || h16 === 0xFFFA || h16 === 0xFFF2) return { ext: 'mp3', isXml: false };
            }

            const textCheck = await blob.slice(0, 20).text();
            if (textCheck.includes('version 1.00')) return { ext: 'mesh', isXml: false };
            if (textCheck.includes('<roblox')) {
                return { ext: 'rbxmx', isXml: true };
            }

            return { ext, isXml };
        }

        async function processDownload(id, forceName = null, depth = 0) {
            if (depth > 3) throw new Error('Слишком много переадресаций.');

            let fileName = forceName || `roblox_asset_${id}`;

            try {
                if (!forceName) {
                    const detailsRes = await fetch(`https://economy.roproxy.com/v2/assets/${id}/details`);
                    if (detailsRes.ok) {
                        const details = await detailsRes.json();
                        if (details && details.Name) {
                            fileName = details.Name.replace(/[^a-z0-9а-яё]/gi, '_').toLowerCase();
                        }
                    }
                }
            } catch (e) {}

            statusDiv.textContent = `Получение данных (ID: ${id})...`;
            
            const response = await fetch(`https://assetdelivery.roproxy.com/v2/asset?id=${id}`);
            if (!response.ok) throw new Error('Ассет недоступен или скрыт.');
            
            const data = await response.json();
            if (!data.locations || data.locations.length === 0) throw new Error('Файл не найден.');
            
            const fileUrl = data.locations[0].location;
            const proxiedUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(fileUrl)}`;
            
            const fileResponse = await fetch(proxiedUrl);
            if (!fileResponse.ok) throw new Error('Ошибка скачивания файла.');
            
            const blob = await fileResponse.blob();
            const analysis = await analyzeBlob(blob);

            if (analysis.isXml) {
                const text = await blob.text();
                const match = text.match(/id=(\d+)/);
                if (match && match[1] !== id) {
                    statusDiv.textContent = 'Обнаружен XML-контейнер, извлекаем исходник...';
                    return await processDownload(match[1], fileName, depth + 1);
                }
            }

            const finalName = `${fileName}.${analysis.ext}`;
            const blobUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = finalName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(blobUrl), 10000);

            statusDiv.textContent = `Успех! Сохранено как .${analysis.ext}`;
        }

        downloadBtn.addEventListener('click', async () => {
            const id = assetIdInput.value.replace(/\D/g, '');
            if (!id) {
                statusDiv.textContent = 'Ошибка: введите корректный ID';
                return;
            }
            
            downloadBtn.disabled = true;
            statusDiv.textContent = 'Начинаем процесс...';
            
            try {
                await processDownload(id);
            } catch (error) {
                statusDiv.textContent = `Ошибка: ${error.message}`;
            } finally {
                downloadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>

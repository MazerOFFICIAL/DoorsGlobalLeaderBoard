<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOORS Global Network</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #020203;
      --bg-card: #0a0a0f;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #00E5FF;
      --text-main: #f8fafc;
      --text-muted: #64748b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg-base);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background-image: radial-gradient(circle at top right, rgba(0,229,255,0.03) 0%, transparent 50%);
    }

    .font-raj { font-family: 'Rajdhani', sans-serif; }

    .nav-glass {
      background: rgba(2, 2, 3, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .input-control {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      color: #f8fafc;
      transition: all 0.2s;
    }

    .input-control:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(0, 229, 255, 0.02);
      box-shadow: 0 0 15px rgba(0,229,255,0.15);
    }

    .podium-container {
      display: grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap: 1.5rem;
      align-items: flex-end;
      margin-bottom: 3rem;
      padding-top: 2rem;
    }

    .podium-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.3s, border-color 0.3s;
    }

    .podium-card:hover { transform: translateY(-5px); border-color: rgba(255, 255, 255, 0.2); }
    
    .podium-1 { border-color: rgba(212, 175, 55, 0.4); box-shadow: 0 10px 40px rgba(212, 175, 55, 0.08); height: 100%; }
    .podium-2 { border-color: rgba(148, 163, 184, 0.3); }
    .podium-3 { border-color: rgba(184, 115, 51, 0.3); }

    .rank-badge {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      font-weight: 700;
      font-family: 'Rajdhani', sans-serif;
      margin-top: -44px;
      margin-bottom: 1rem;
      border: 4px solid var(--bg-base);
    }

    .podium-1 .rank-badge { background: linear-gradient(135deg, #FFEAA7, #D4AF37); color: #000; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
    .podium-2 .rank-badge { background: linear-gradient(135deg, #F1F5F9, #94A3B8); color: #000; }
    .podium-3 .rank-badge { background: linear-gradient(135deg, #E2A76F, #B87333); color: #fff; }

    .list-header {
      display: grid;
      grid-template-columns: 80px 2fr 1fr 1fr 1fr 40px;
      padding: 1rem 1.5rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
    }

    .list-row {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 0.75rem;
      transition: all 0.2s;
    }

    .list-row:hover { border-color: rgba(0, 229, 255, 0.3); }

    .row-header {
      display: grid;
      grid-template-columns: 80px 2fr 1fr 1fr 1fr 40px;
      padding: 1.25rem 1.5rem;
      align-items: center;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <nav class="nav-glass py-4">
    <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded bg-white text-black flex items-center justify-center font-raj text-3xl font-bold">D</div>
        <div>
          <h1 class="text-2xl font-bold tracking-wider font-raj">DOORS LQS</h1>
          <p class="text-[0.65rem] text-[#00E5FF] tracking-[0.2em] uppercase">Global Architecture</p>
        </div>
      </div>
      
      <div class="flex w-full md:w-auto gap-3">
        <input type="text" id="searchInput" class="input-control px-4 py-2.5 rounded-lg w-full md:w-64 text-sm" placeholder="Search entity...">
        <select id="sortSelect" class="input-control px-4 py-2.5 rounded-lg text-sm cursor-pointer">
          <option value="overall">Sort: Rating</option>
          <option value="wins">Sort: Wins</option>
          <option value="hours">Sort: Hours</option>
          <option value="knobs">Sort: Knobs</option>
        </select>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 py-10">
    <div id="podiumArea" class="podium-container"></div>
    
    <div id="listArea" class="mt-8">
      <div class="list-header hidden md:grid">
        <div>Rank</div><div>Operative</div><div>LQS Score</div><div>Knobs</div><div>Playtime</div><div></div>
      </div>
      <div id="playersList"></div>
    </div>
  </main>

  <script src="playersdata.js"></script>
  <script>
    function fmtNum(n) {
      if (!n) return '0';
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return n.toLocaleString();
    }

    function calcScore(p) {
      const maxVals = {
        w: Math.max(1, ...playersData.map(x => x.totalWins ?? 0)),
        k: Math.max(1, ...playersData.map(x => x.economy?.knobs ?? 0)),
        h: Math.max(1, ...playersData.map(x => x.hoursPlayed ?? 0))
      };
      const wScore = ((p.totalWins ?? 0) / maxVals.w) * 100;
      const kScore = ((p.economy?.knobs ?? 0) / maxVals.k) * 100;
      const hScore = ((p.hoursPlayed ?? 0) / maxVals.h) * 100;
      return Math.min(100, (wScore * 0.4) + (kScore * 0.3) + (hScore * 0.3));
    }

    function renderPodium(arr) {
      const container = document.getElementById('podiumArea');
      container.innerHTML = '';
      if(arr.length === 0) return;
      
      const order = [1, 0, 2];
      order.forEach(i => {
        if(!arr[i]) return;
        const p = arr[i];
        const rank = i + 1;
        const score = calcScore(p);
        
        const el = document.createElement('div');
        el.className = `podium-card podium-${rank}`;
        el.innerHTML = `
          <div class="rank-badge">${rank}</div>
          <h2 class="text-xl font-bold text-white mb-1 font-raj">${p.name}</h2>
          <div class="text-xs text-[#64748b] mb-5 tracking-widest uppercase">${p.region ?? 'UNKNOWN'}</div>
          
          <div class="w-full flex justify-between px-2 mb-2">
            <span class="text-xs text-[#64748b] uppercase">Rating</span>
            <span class="text-sm font-bold text-[#00E5FF] font-raj">${score.toFixed(1)}</span>
          </div>
          <div class="w-full flex justify-between px-2 mb-2">
            <span class="text-xs text-[#64748b] uppercase">Wins</span>
            <span class="text-sm font-bold text-white font-raj">${fmtNum(p.totalWins ?? 0)}</span>
          </div>
        `;
        el.addEventListener('click', function() {
          window.location.href = 'profile.html?id=' + p.id;
        });
        container.appendChild(el);
      });
    }

    function renderList(arr, startIdx) {
      const container = document.getElementById('playersList');
      container.innerHTML = '';
      if(arr.length === 0) {
        container.innerHTML = '<div class="text-center py-12 text-[#64748b]">No records found.</div>';
        return;
      }

      arr.forEach((p, i) => {
        const rank = startIdx + i + 1;
        const score = calcScore(p);
        const el = document.createElement('div');
        el.className = 'list-row';
        el.innerHTML = `
          <div class="row-header">
            <div class="font-raj text-2xl font-bold text-[#475569]">#${rank}</div>
            <div>
              <div class="text-[#f8fafc] font-bold text-lg font-raj">${p.name}</div>
              <div class="text-[0.65rem] text-[#64748b] uppercase tracking-wider mt-0.5">${p.region ?? 'UNK'} • ${p.status ?? 'Offline'}</div>
            </div>
            <div class="font-raj text-xl font-bold text-[#00E5FF]">${score.toFixed(1)}</div>
            <div class="font-raj text-lg font-semibold text-[#ffc107]">${fmtNum(p.economy?.knobs ?? 0)}</div>
            <div class="font-raj text-lg font-semibold text-[#f8fafc]">${fmtNum(p.hoursPlayed ?? 0)}h</div>
            <div class="text-right text-[#00E5FF]">PROFILE ➔</div>
          </div>
        `;
        el.querySelector('.row-header').addEventListener('click', function() {
          window.location.href = 'profile.html?id=' + p.id;
        });
        container.appendChild(el);
      });
    }

    function processRender(data, sortType) {
      let sorted = [...data];
      if (sortType === 'overall') sorted.sort((a, b) => calcScore(b) - calcScore(a));
      else if (sortType === 'wins') sorted.sort((a, b) => (b.totalWins ?? 0) - (a.totalWins ?? 0));
      else if (sortType === 'hours') sorted.sort((a, b) => (b.hoursPlayed ?? 0) - (a.hoursPlayed ?? 0));
      else if (sortType === 'knobs') sorted.sort((a, b) => (b.economy?.knobs ?? 0) - (a.economy?.knobs ?? 0));

      const isSearching = document.getElementById('searchInput').value.trim().length > 0;

      if (!isSearching && sorted.length >= 3 && (sortType === 'overall' || sortType === 'wins')) {
        document.getElementById('podiumArea').style.display = 'grid';
        renderPodium(sorted.slice(0, 3));
        renderList(sorted.slice(3), 3);
      } else {
        document.getElementById('podiumArea').style.display = 'none';
        renderList(sorted, 0);
      }
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      const filtered = playersData.filter(p => p.name.toLowerCase().includes(q));
      processRender(filtered, document.getElementById('sortSelect').value);
    });

    document.getElementById('sortSelect').addEventListener('change', (e) => {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const filtered = playersData.filter(p => p.name.toLowerCase().includes(q));
      processRender(filtered, e.target.value);
    });

    processRender(playersData, 'overall');
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOORS GLOBAL LEADERBOARD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap');
    * { font-family: 'Rubik', sans-serif; }
    
    body {
      background: #0F0F0F;
      color: #E6E6E6;
    }

    .header {
      background: linear-gradient(180deg, #1A1A1A 0%, #151515 100%);
      border-bottom: 2px solid #FFD700;
      box-shadow: 0 8px 32px rgba(255, 215, 0, 0.1);
      padding: 24px 0;
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: #FFD700;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    .header p {
      color: #00FFFF;
      font-size: 0.9rem;
      margin-top: 8px;
    }

    .controls {
      display: flex;
      gap: 16px;
      margin: 24px 0;
      flex-wrap: wrap;
    }

    .search-input {
      flex: 1;
      min-width: 250px;
      background: #1A1A1A;
      border: 1px solid #404040;
      border-radius: 8px;
      padding: 12px 16px;
      color: #E6E6E6;
      transition: all 0.3s;
    }

    .search-input:focus {
      outline: none;
      border-color: #FFD700;
      box-shadow: 0 0 12px rgba(255, 215, 0, 0.2);
    }

    .sort-select {
      background: #1A1A1A;
      border: 1px solid #404040;
      border-radius: 8px;
      padding: 12px 16px;
      color: #E6E6E6;
      cursor: pointer;
      transition: all 0.3s;
      min-width: 200px;
    }

    .sort-select:focus {
      outline: none;
      border-color: #FFD700;
      box-shadow: 0 0 12px rgba(255, 215, 0, 0.2);
    }

    .players-container {
      display: grid;
      gap: 16px;
      margin-top: 24px;
    }

    .player-card {
      background: linear-gradient(135deg, #1A1A1A 0%, #252525 100%);
      border: 1px solid #404040;
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s;
      cursor: pointer;
    }

    .player-card:hover {
      border-color: #FFD700;
      box-shadow: 0 8px 24px rgba(255, 215, 0, 0.15);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: linear-gradient(90deg, #252525 0%, #1A1A1A 100%);
      border-bottom: 1px solid #404040;
    }

    .rank-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
    }

    .rank-1 {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #000;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
    }

    .rank-2 {
      background: linear-gradient(135deg, #C0C0C0, #808080);
      color: #000;
      box-shadow: 0 0 16px rgba(192, 192, 192, 0.3);
    }

    .rank-3 {
      background: linear-gradient(135deg, #CD7F32, #8B4513);
      color: #fff;
      box-shadow: 0 0 16px rgba(205, 127, 50, 0.3);
    }

    .rank-other {
      background: linear-gradient(135deg, #404040, #303030);
      color: #FFD700;
    }

    .player-info {
      flex: 1;
      margin-left: 24px;
    }

    .player-name {
      font-size: 1.25rem;
      font-weight: 700;
      color: #FFD700;
      margin-bottom: 4px;
    }

    .player-meta {
      display: flex;
      gap: 16px;
      font-size: 0.85rem;
      color: #909090;
    }

    .player-stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .overall-score {
      font-size: 1.5rem;
      font-weight: 700;
      color: #00FFFF;
      text-align: center;
    }

    .overall-label {
      font-size: 0.75rem;
      color: #909090;
      text-align: center;
      margin-top: 4px;
    }

    .card-body {
      padding: 20px;
      display: none;
    }

    .card-body.expanded {
      display: block;
      animation: expandIn 0.3s ease-out;
    }

    @keyframes expandIn {
      from {
        opacity: 0;
        max-height: 0;
      }
      to {
        opacity: 1;
        max-height: 1000px;
      }
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .stat-item {
      background: #0F0F0F;
      border: 1px solid #404040;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .stat-item-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #FFD700;
    }

    .stat-item-label {
      font-size: 0.75rem;
      color: #909090;
      margin-top: 4px;
      text-transform: uppercase;
    }

    .section-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #00FFFF;
      margin: 16px 0 8px 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px;
    }

    .detail-badge {
      background: #0F0F0F;
      border: 1px solid #404040;
      border-radius: 6px;
      padding: 8px;
      text-align: center;
      font-size: 0.8rem;
    }

    .detail-badge-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #00FFFF;
    }

    .detail-badge-label {
      font-size: 0.7rem;
      color: #909090;
      margin-top: 2px;
    }

    .toggle-btn {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #000;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.9rem;
    }

    .toggle-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
    }

    .toggle-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid #404040;
    }

    .no-players {
      text-align: center;
      padding: 48px 20px;
      color: #909090;
    }
  </style>
</head>
<body>
  <div class="max-w-6xl mx-auto px-4 py-8">
    <!-- Header -->
    <div class="header">
      <div class="text-center">
        <h1>🚪 DOORS GLOBAL LEADERBOARD 🏆</h1>
        <p>Intelligent Ranking System | DOORS Player Rankings</p>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <input type="text" id="searchInput" class="search-input" placeholder="Search player by name...">
      <select id="sortSelect" class="sort-select">
        <option value="overall">Sort: Overall Score</option>
        <option value="wins">Sort: Total Wins</option>
        <option value="hours">Sort: Hours Played</option>
        <option value="deaths">Sort: Total Deaths</option>
        <option value="knobs">Sort: Total Knobs</option>
      </select>
    </div>

    <!-- Players Container -->
    <div class="players-container" id="playersContainer">
      <div class="no-players">Loading players...</div>
    </div>
  </div>

  <script src="playersdata.js"></script>
  <script>
    // Format numbers with K/M notation
    function formatNumber(num) {
      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
      return num.toLocaleString();
    }

    // Calculate overall score
    function calculateOverallScore(player) {
      const maxMetrics = {
        wins: Math.max(...playersData.map(p => p.totalWins || 0)),
        knobs: Math.max(...playersData.map(p => p.totalKnobs || 0)),
        deaths: Math.max(...playersData.map(p => p.totalDeaths || 0)),
        hours: Math.max(...playersData.map(p => p.hoursPlayed || 0)),
        badges: Math.max(...playersData.map(p => (p.doorsTotal || 0) + (p.hdBadges || 0) + (p.ghostHuntBadges || 0) + (p.findApplesBadges || 0))),
        revives: Math.max(...playersData.map(p => p.totalRevives || 0))
      };

      const scores = {
        wins: ((player.totalWins || 0) / (maxMetrics.wins || 1)) * 100,
        knobs: ((player.totalKnobs || 0) / (maxMetrics.knobs || 1)) * 100,
        deaths: ((player.totalDeaths || 0) / (maxMetrics.deaths || 1)) * 100,
        hours: ((player.hoursPlayed || 0) / (maxMetrics.hours || 1)) * 100,
        badges: (((player.doorsTotal || 0) + (player.hdBadges || 0) + (player.ghostHuntBadges || 0) + (player.findApplesBadges || 0)) / (maxMetrics.badges || 1)) * 100,
        revives: ((player.totalRevives || 0) / (maxMetrics.revives || 1)) * 100
      };

      // Weighted average
      const weights = { wins: 0.25, knobs: 0.20, deaths: 0.15, hours: 0.15, badges: 0.15, revives: 0.10 };
      let overall = 0;
      for (const key in weights) {
        overall += scores[key] * weights[key];
      }
      return Math.min(100, overall);
    }

    // Get rank badge class
    function getRankBadgeClass(rank) {
      if (rank === 1) return 'rank-badge rank-1';
      if (rank === 2) return 'rank-badge rank-2';
      if (rank === 3) return 'rank-badge rank-3';
      return 'rank-badge rank-other';
    }

    // Create player card
    function createPlayerCard(player, rank) {
      const overallScore = calculateOverallScore(player);
      const totalBadges = (player.doorsTotal || 0) + (player.hdBadges || 0) + (player.ghostHuntBadges || 0) + (player.findApplesBadges || 0);

      const card = document.createElement('div');
      card.className = 'player-card';
      card.innerHTML = `
        <div class="card-header">
          <div class="${getRankBadgeClass(rank)}" data-rank="${rank}">${rank}</div>
          <div class="player-info">
            <div class="player-name">${player.name}</div>
            <div class="player-meta">
              <div class="player-stat">📍 ${player.region || 'Unknown'}</div>
              <div class="player-stat">⏱️ ${formatNumber(player.hoursPlayed)} hrs</div>
            </div>
          </div>
          <div>
            <div class="overall-score">${overallScore.toFixed(1)}</div>
            <div class="overall-label">Overall</div>
          </div>
        </div>
        <div class="card-body">
          <!-- Main Stats -->
          <div class="stat-grid">
            <div class="stat-item">
              <div class="stat-item-value">${formatNumber(player.totalWins)}</div>
              <div class="stat-item-label">Total Wins</div>
            </div>
            <div class="stat-item">
              <div class="stat-item-value">${formatNumber(player.totalDeaths)}</div>
              <div class="stat-item-label">Deaths</div>
            </div>
            <div class="stat-item">
              <div class="stat-item-value">${formatNumber(player.totalKnobs)}</div>
              <div class="stat-item-label">Knobs</div>
            </div>
            <div class="stat-item">
              <div class="stat-item-value">${formatNumber(player.totalRevives)}</div>
              <div class="stat-item-label">Revives</div>
            </div>
            <div class="stat-item">
              <div class="stat-item-value">${formatNumber(player.daysActive)}</div>
              <div class="stat-item-label">Days Active</div>
            </div>
            <div class="stat-item">
              <div class="stat-item-value">${formatNumber(totalBadges)}</div>
              <div class="stat-item-label">Badges</div>
            </div>
          </div>

          <!-- Floor Wins -->
          <div class="section-title">🚪 Floor Wins</div>
          <div class="details-grid">
            <div class="detail-badge">
              <div class="detail-badge-value">${formatNumber(player.winsHotel || 0)}</div>
              <div class="detail-badge-label">Hotel</div>
            </div>
            <div class="detail-badge">
              <div class="detail-badge-value">${formatNumber(player.winsLegacyHotel || 0)}</div>
              <div class="detail-badge-label">Legacy</div>
            </div>
            <div class="detail-badge">
              <div class="detail-badge-value">${formatNumber(player.winsRooms || 0)}</div>
              <div class="detail-badge-label">Rooms</div>
            </div>
            <div class="detail-badge">
              <div class="detail-badge-value">${formatNumber(player.winsBackdoor || 0)}</div>
              <div class="detail-badge-label">Backdoor</div>
            </div>
            <div class="detail-badge">
              <div class="detail-badge-value">${formatNumber(player.winsMines || 0)}</div>
              <div class="detail-badge-label">Mines</div>
            </div>
            <div class="detail-badge">
              <div class="detail-badge-value">${formatNumber(player.winsOutdoors || 0)}</div>
              <div class="detail-badge-label">Outdoors</div>
            </div>
          </div>

          <!-- Special Modes -->
          <div class="section-title">🎮 Special Modes</div>
          <div class="details-grid">
            <div class="detail-badge">
              <div class="detail-badge-value">${formatNumber(player.winsSuperHardMode || 0)}</div>
              <div class="detail-badge-label">Super Hard</div>
            </div>
            <div class="detail-badge">
              <div class="detail-badge-value">${formatNumber(player.winsHotelHell || 0)}</div>
              <div class="detail-badge-label">Hell</div>
            </div>
            <div class="detail-badge">
              <div class="detail-badge-value">${formatNumber(player.winsRetroMode || 0)}</div>
              <div class="detail-badge-label">Retro</div>
            </div>
            <div class="detail-badge">
              <div class="detail-badge-value">${formatNumber(player.winsVoidBusters || 0)}</div>
              <div class="detail-badge-label">Void</div>
            </div>
            <div class="detail-badge">
              <div class="detail-badge-value">${formatNumber(player.winsChaosMode || 0)}</div>
              <div class="detail-badge-label">Chaos</div>
            </div>
            <div class="detail-badge">
              <div class="detail-badge-value">${formatNumber(player.winsMatchmaking || 0)}</div>
              <div class="detail-badge-label">Ranked</div>
            </div>
          </div>

          <!-- Badges -->
          <div class="section-title">🏅 Achievement Badges</div>
          <div class="details-grid">
            <div class="detail-badge">
              <div class="detail-badge-value">${formatNumber(player.doorsTotal || 0)}</div>
              <div class="detail-badge-label">Doors</div>
            </div>
            <div class="detail-badge">
              <div class="detail-badge-value">${formatNumber(player.hdBadges || 0)}</div>
              <div class="detail-badge-label">H"D"</div>
            </div>
            <div class="detail-badge">
              <div class="detail-badge-value">${formatNumber(player.ghostHuntBadges || 0)}</div>
              <div class="detail-badge-label">Ghost</div>
            </div>
            <div class="detail-badge">
              <div class="detail-badge-value">${formatNumber(player.findApplesBadges || 0)}</div>
              <div class="detail-badge-label">Apples</div>
            </div>
          </div>

          <div class="toggle-section">
            <span style="color: #909090; font-size: 0.9rem;">Completion: ${player.completionPercentage || 0}%</span>
            <button class="toggle-btn" onclick="toggleCard(this)">Collapse</button>
          </div>
        </div>
      `;

      card.querySelector('.card-header').addEventListener('click', () => toggleCard(card.querySelector('.toggle-btn')));
      return card;
    }

    // Toggle card expansion
    function toggleCard(btn) {
      const card = btn.closest('.player-card');
      const body = card.querySelector('.card-body');
      body.classList.toggle('expanded');
      btn.textContent = body.classList.contains('expanded') ? 'Collapse' : 'Expand';
    }

    // Render players
    function renderPlayers(players, sortBy = 'overall') {
      const container = document.getElementById('playersContainer');
      
      if (!players || players.length === 0) {
        container.innerHTML = '<div class="no-players">No players found</div>';
        return;
      }

      // Sort players
      let sorted = [...players];
      if (sortBy === 'overall') {
        sorted.sort((a, b) => calculateOverallScore(b) - calculateOverallScore(a));
      } else if (sortBy === 'wins') {
        sorted.sort((a, b) => (b.totalWins || 0) - (a.totalWins || 0));
      } else if (sortBy === 'hours') {
        sorted.sort((a, b) => (b.hoursPlayed || 0) - (a.hoursPlayed || 0));
      } else if (sortBy === 'deaths') {
        sorted.sort((a, b) => (b.totalDeaths || 0) - (a.totalDeaths || 0));
      } else if (sortBy === 'knobs') {
        sorted.sort((a, b) => (b.totalKnobs || 0) - (a.totalKnobs || 0));
      }

      container.innerHTML = '';
      sorted.forEach((player, index) => {
        container.appendChild(createPlayerCard(player, index + 1));
      });
    }

    // Event listeners
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      const filtered = playersData.filter(p => p.name.toLowerCase().includes(query));
      const sortBy = document.getElementById('sortSelect').value;
      renderPlayers(filtered, sortBy);
    });

    document.getElementById('sortSelect').addEventListener('change', (e) => {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const filtered = playersData.filter(p => p.name.toLowerCase().includes(query));
      renderPlayers(filtered, e.target.value);
    });

    // Initial render
    renderPlayers(playersData, 'overall');
  </script>
</body>
</html>

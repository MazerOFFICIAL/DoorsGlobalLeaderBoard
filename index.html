<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Audio Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #111827, #1f2937, #374151);
            color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        input, select, button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            outline: none;
            font-size: 15px;
            transition: all 0.2s ease;
        }
        input, select {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input:focus, select:focus {
            border-color: #6366f1;
            background: rgba(255, 255, 255, 0.08);
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        option {
            background: #1f2937;
            color: #fff;
        }
        button {
            background: #6366f1;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover {
            background: #4f46e5;
            transform: translateY(-1px);
        }
        button:active {
            transform: translateY(1px);
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #9ca3af;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Roblox Sound Decompiler</h1>
        <div class="input-group">
            <input type="text" id="assetId" placeholder="Введите ID аудио (например: 142376088)">
        </div>
        <div class="input-group">
            <select id="format">
                <option value="mp3">MP3 Format (.mp3)</option>
                <option value="ogg">OGG Format (.ogg)</option>
                <option value="wav">WAV Format (.wav)</option>
            </select>
        </div>
        <button id="downloadBtn">Скачать ассет</button>
        <div id="status"></div>
    </div>

    <script>
        const downloadBtn = document.getElementById('downloadBtn');
        const assetIdInput = document.getElementById('assetId');
        const formatSelect = document.getElementById('format');
        const statusDiv = document.getElementById('status');

        downloadBtn.addEventListener('click', async () => {
            const id = assetIdInput.value.trim();
            if (!id) {
                statusDiv.textContent = 'Ошибка: введите ID';
                return;
            }
            
            statusDiv.textContent = 'Получение данных...';
            
            try {
                let fileName = `roblox_audio_${id}`;
                try {
                    const detailsRes = await fetch(`https://economy.roproxy.com/v2/assets/${id}/details`);
                    if (detailsRes.ok) {
                        const details = await detailsRes.json();
                        if (details && details.Name) {
                            fileName = details.Name.replace(/[^a-z0-9а-яё]/gi, '_').toLowerCase();
                        }
                    }
                } catch (e) {}

                const response = await fetch(`https://assetdelivery.roproxy.com/v2/asset?id=${id}`);
                if (!response.ok) throw new Error('Fetch failed');
                
                const data = await response.json();
                if (!data.locations || data.locations.length === 0) {
                    statusDiv.textContent = 'Ошибка: аудио не найдено или оно приватное.';
                    return;
                }
                
                const fileUrl = data.locations[0].location;
                const format = formatSelect.value;
                const finalName = `${fileName}.${format}`;
                
                statusDiv.textContent = 'Скачивание файла...';
                
                const proxiedUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(fileUrl)}`;
                const audioResponse = await fetch(proxiedUrl);
                const blob = await audioResponse.blob();
                
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = finalName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);
                
                statusDiv.textContent = 'Готово! Файл успешно скачан.';
            } catch (error) {
                statusDiv.textContent = 'Ошибка. Проверьте ID или доступность серверов.';
            }
        });
    </script>
</body>
</html>

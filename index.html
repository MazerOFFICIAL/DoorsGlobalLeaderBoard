<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOORS Pro Leaderboard | LQS Network</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #030305;
      --bg-panel: #0d0d12;
      --border-color: rgba(255, 255, 255, 0.06);
      --accent: #00E5FF;
      --accent-glow: rgba(0, 229, 255, 0.15);
      --danger: #FF3366;
      --hotel: #D4AF37;
      --mines: #7B8C9E;
      --rooms: #4A5D23;
      --backdoor: #8A2BE2;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg-dark);
      color: #94a3b8;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(0, 229, 255, 0.02) 0%, transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(255, 51, 102, 0.02) 0%, transparent 25%);
    }

    h1, h2, h3, .font-rajdhani {
      font-family: 'Rajdhani', sans-serif;
    }

    .glass-nav {
      background: rgba(3, 3, 5, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .input-control {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      color: #f8fafc;
      transition: all 0.2s ease;
    }

    .input-control:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(0, 229, 255, 0.02);
      box-shadow: 0 0 15px var(--accent-glow);
    }

    .podium-container {
      display: grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap: 1.5rem;
      align-items: flex-end;
      margin-bottom: 3rem;
      padding-top: 2rem;
    }

    .podium-card {
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1.5rem;
      position: relative;
      transition: transform 0.3s ease, border-color 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }

    .podium-card:hover { transform: translateY(-4px); }
    
    .podium-1 { border-color: rgba(212, 175, 55, 0.4); box-shadow: 0 10px 40px rgba(212, 175, 55, 0.08); height: 100%; }
    .podium-2 { border-color: rgba(148, 163, 184, 0.3); }
    .podium-3 { border-color: rgba(184, 115, 51, 0.3); }

    .rank-badge {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      font-weight: 700;
      font-family: 'Rajdhani', sans-serif;
      margin-top: -44px;
      margin-bottom: 1rem;
      border: 4px solid var(--bg-dark);
    }

    .podium-1 .rank-badge { background: linear-gradient(135deg, #FFEAA7, #D4AF37); color: #000; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
    .podium-2 .rank-badge { background: linear-gradient(135deg, #F1F5F9, #94A3B8); color: #000; }
    .podium-3 .rank-badge { background: linear-gradient(135deg, #E2A76F, #B87333); color: #fff; }

    .list-header {
      display: grid;
      grid-template-columns: 70px 2fr 1fr 1fr 1fr 40px;
      padding: 1rem 1.5rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border-color);
      color: #64748b;
    }

    .list-row {
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      margin-bottom: 0.75rem;
      transition: all 0.2s ease;
      overflow: hidden;
    }

    .list-row:hover { border-color: rgba(255, 255, 255, 0.15); }

    .list-row-main {
      display: grid;
      grid-template-columns: 70px 2fr 1fr 1fr 1fr 40px;
      padding: 1.25rem 1.5rem;
      align-items: center;
      cursor: pointer;
    }

    .details-panel {
      max-height: 0;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(0, 0, 0, 0.3);
      border-top: 1px solid transparent;
      overflow: hidden;
    }

    .list-row.active .details-panel, .podium-card.active .details-panel {
      max-height: 1000px;
      opacity: 1;
      border-top-color: var(--border-color);
      padding: 1.5rem;
    }

    .podium-card .details-panel {
      position: absolute;
      top: 100%; left: 0; right: 0;
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      z-index: 20;
      margin-top: 0.5rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8);
      text-align: left;
    }

    .grid-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 0.75rem;
    }

    .micro-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.75rem;
      position: relative;
      overflow: hidden;
    }

    .mc-hotel::before { content:''; position:absolute; top:0; left:0; width:2px; height:100%; background:var(--hotel); }
    .mc-mines::before { content:''; position:absolute; top:0; left:0; width:2px; height:100%; background:var(--mines); }
    .mc-rooms::before { content:''; position:absolute; top:0; left:0; width:2px; height:100%; background:var(--rooms); }
    .mc-backdoor::before { content:''; position:absolute; top:0; left:0; width:2px; height:100%; background:var(--backdoor); }
    .mc-hard::before { content:''; position:absolute; top:0; left:0; width:2px; height:100%; background:var(--danger); }

    .micro-value {
      color: #f8fafc;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1;
    }

    .micro-label {
      font-size: 0.65rem;
      color: #64748b;
      text-transform: uppercase;
      margin-top: 6px;
      letter-spacing: 0.05em;
    }

    .section-tag {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      color: #f8fafc;
      margin: 1.5rem 0 0.75rem 0;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
    }

    .section-tag::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }

    .chevron { transition: transform 0.3s ease; color: #64748b; }
    .active .chevron { transform: rotate(180deg); color: var(--accent); }

    @media (max-width: 768px) {
      .podium-container { grid-template-columns: 1fr; gap: 3rem; }
      .podium-1 { order: -1; }
      .list-header { display: none; }
      .list-row-main { grid-template-columns: 50px 1fr 40px; gap: 1rem; }
      .hide-mobile { display: none; }
    }
  </style>
</head>
<body>

  <nav class="glass-nav py-4">
    <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-[#00E5FF] to-[#0077FF] flex items-center justify-center text-white font-bold text-2xl font-rajdhani shadow-[0_0_20px_rgba(0,229,255,0.3)]">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14H7v-2h5v2zm0-4H7v-2h5v2zm0-4H7V7h5v2zm6 8h-4v-2h4v2zm0-4h-4v-2h4v2zm0-4h-4V7h4v2z"/></svg>
        </div>
        <div>
          <h1 class="text-2xl font-bold tracking-wide text-white leading-tight">DOORS LQS</h1>
          <p class="text-[0.65rem] text-[#00E5FF] tracking-[0.2em] uppercase">Global Architecture</p>
        </div>
      </div>
      
      <div class="flex w-full md:w-auto gap-3">
        <input type="text" id="searchInput" class="input-control px-4 py-2.5 rounded-lg w-full md:w-64 text-sm" placeholder="Search entity...">
        <select id="sortSelect" class="input-control px-4 py-2.5 rounded-lg text-sm cursor-pointer">
          <option value="overall">Sort: Rating</option>
          <option value="wins">Sort: Wins</option>
          <option value="hours">Sort: Hours Logged</option>
          <option value="knobs">Sort: Knobs Mined</option>
        </select>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 py-10">
    <div id="podiumArea" class="podium-container"></div>
    
    <div id="listArea" class="mt-8">
      <div class="list-header hide-mobile">
        <div>Rank</div>
        <div>Player Identity</div>
        <div>LQS Rating</div>
        <div>Total Extractions</div>
        <div>Time Logged</div>
        <div></div>
      </div>
      <div id="playersList"></div>
    </div>
  </main>

  <script src="playersdata.js"></script>
  <script>
    function fmtNum(n) {
      if (typeof n !== 'number') return '0';
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return n.toLocaleString();
    }

    function calcScore(p) {
      const maxVals = {
        w: Math.max(1, ...playersData.map(x => x.totalWins ?? 0)),
        k: Math.max(1, ...playersData.map(x => x.totalKnobs ?? 0)),
        h: Math.max(1, ...playersData.map(x => x.hoursPlayed ?? 0)),
        b: Math.max(1, ...playersData.map(x => (x.doorsTotal ?? 0) + (x.hdBadges ?? 0) + (x.ghostHuntBadges ?? 0) + (x.findApplesBadges ?? 0))),
        r: Math.max(1, ...playersData.map(x => x.totalRevives ?? 0))
      };
      
      const scores = {
        w: ((p.totalWins ?? 0) / maxVals.w) * 100,
        k: ((p.totalKnobs ?? 0) / maxVals.k) * 100,
        h: ((p.hoursPlayed ?? 0) / maxVals.h) * 100,
        b: (((p.doorsTotal ?? 0) + (p.hdBadges ?? 0) + (p.ghostHuntBadges ?? 0) + (p.findApplesBadges ?? 0)) / maxVals.b) * 100,
        r: ((p.totalRevives ?? 0) / maxVals.r) * 100
      };
      
      const finalScore = (scores.w * 0.35) + (scores.k * 0.20) + (scores.h * 0.15) + (scores.b * 0.20) + (scores.r * 0.10);
      return Math.min(100, finalScore);
    }

    function buildDetails(p) {
      const totalBadges = (p.doorsTotal ?? 0) + (p.hdBadges ?? 0) + (p.ghostHuntBadges ?? 0) + (p.findApplesBadges ?? 0);
      return `
        <div class="details-panel">
          <div class="section-tag">Main Floors</div>
          <div class="grid-stats">
            <div class="micro-card mc-hotel"><div class="micro-value">${fmtNum(p.winsHotel ?? 0)}</div><div class="micro-label">The Hotel</div></div>
            <div class="micro-card mc-mines"><div class="micro-value">${fmtNum(p.winsMines ?? 0)}</div><div class="micro-label">The Mines</div></div>
          </div>

          <div class="section-tag">Sub-Floors & Anomalies</div>
          <div class="grid-stats">
            <div class="micro-card mc-rooms"><div class="micro-value">${fmtNum(p.winsRooms ?? 0)}</div><div class="micro-label">The Rooms</div></div>
            <div class="micro-card mc-backdoor"><div class="micro-value">${fmtNum(p.winsBackdoor ?? 0)}</div><div class="micro-label">The Backdoor</div></div>
            <div class="micro-card"><div class="micro-value">${fmtNum(p.winsOutdoors ?? 0)}</div><div class="micro-label">The Outdoors</div></div>
          </div>

          <div class="section-tag">Hardcore & Modifiers</div>
          <div class="grid-stats">
            <div class="micro-card mc-hard"><div class="micro-value">${fmtNum(p.winsHotelHell ?? 0)}</div><div class="micro-label">Hotel Hell</div></div>
            <div class="micro-card mc-hard"><div class="micro-value">${fmtNum(p.winsSuperHardMode ?? 0)}</div><div class="micro-label">Super Hard Mode</div></div>
            <div class="micro-card"><div class="micro-value">${fmtNum(p.winsRetroMode ?? 0)}</div><div class="micro-label">Retro Mode</div></div>
          </div>

          <div class="section-tag">Economy & Meta</div>
          <div class="grid-stats">
            <div class="micro-card"><div class="micro-value text-[#00E5FF]">${fmtNum(p.totalKnobs ?? 0)}</div><div class="micro-label">Knobs</div></div>
            <div class="micro-card"><div class="micro-value">${fmtNum(p.totalRevives ?? 0)}</div><div class="micro-label">Revives Used</div></div>
            <div class="micro-card"><div class="micro-value">${fmtNum(totalBadges)}</div><div class="micro-label">Total Badges</div></div>
            <div class="micro-card"><div class="micro-value">${p.completionPercentage ?? 0}%</div><div class="micro-label">Completion</div></div>
          </div>
        </div>
      `;
    }

    function renderPodium(arr) {
      const container = document.getElementById('podiumArea');
      container.innerHTML = '';
      if(arr.length === 0) return;
      
      const order = [1, 0, 2];
      order.forEach(i => {
        if(!arr[i]) return;
        const p = arr[i];
        const rank = i + 1;
        const score = calcScore(p);
        
        const el = document.createElement('div');
        el.className = `podium-card podium-${rank}`;
        el.innerHTML = `
          <div class="rank-badge">${rank}</div>
          <h2 class="text-xl font-bold text-white mb-1 font-rajdhani">${p.name}</h2>
          <div class="text-xs text-[#64748b] mb-5 tracking-widest uppercase">${p.region ?? 'UNKNOWN'}</div>
          
          <div class="w-full flex justify-between px-2 mb-2">
            <span class="text-xs text-[#64748b] uppercase">Rating</span>
            <span class="text-sm font-bold text-[#00E5FF] font-rajdhani">${score.toFixed(1)}</span>
          </div>
          <div class="w-full flex justify-between px-2 mb-2">
            <span class="text-xs text-[#64748b] uppercase">Extractions</span>
            <span class="text-sm font-bold text-white font-rajdhani">${fmtNum(p.totalWins ?? 0)}</span>
          </div>
          <div class="w-full flex justify-between px-2">
            <span class="text-xs text-[#64748b] uppercase">Deaths</span>
            <span class="text-sm font-bold text-[#FF3366] font-rajdhani">${fmtNum(p.totalDeaths ?? 0)}</span>
          </div>
          ${buildDetails(p)}
        `;
        el.addEventListener('click', function(e) {
          if (e.target.closest('.details-panel') && this.classList.contains('active')) return;
          const isActive = this.classList.contains('active');
          document.querySelectorAll('.podium-card, .list-row').forEach(node => node.classList.remove('active'));
          if(!isActive) this.classList.add('active');
        });
        container.appendChild(el);
      });
    }

    function renderList(arr, startIdx) {
      const container = document.getElementById('playersList');
      container.innerHTML = '';
      if(arr.length === 0) {
        container.innerHTML = '<div class="text-center py-12 text-[#64748b] border border-[#ffffff0f] rounded-xl bg-[#0d0d12]">No entity records found.</div>';
        return;
      }

      arr.forEach((p, i) => {
        const rank = startIdx + i + 1;
        const score = calcScore(p);
        const el = document.createElement('div');
        el.className = 'list-row';
        el.innerHTML = `
          <div class="list-row-main">
            <div class="font-rajdhani text-2xl font-bold text-[#475569]">#${rank}</div>
            <div>
              <div class="text-[#f8fafc] font-bold text-lg font-rajdhani">${p.name}</div>
              <div class="text-[0.65rem] text-[#64748b] uppercase tracking-wider flex gap-2 mt-0.5">
                <span>${p.region ?? 'UNK'}</span>
                <span class="${p.status === 'Online' ? 'text-[#00E5FF]' : ''}">• ${p.status ?? 'Offline'}</span>
              </div>
            </div>
            <div class="hide-mobile font-rajdhani text-xl font-bold text-[#00E5FF]">${score.toFixed(1)}</div>
            <div class="hide-mobile font-rajdhani text-lg font-semibold text-[#f8fafc]">${fmtNum(p.totalWins ?? 0)}</div>
            <div class="hide-mobile font-rajdhani text-lg font-semibold text-[#f8fafc]">${fmtNum(p.hoursPlayed ?? 0)}<span class="text-[#64748b] text-sm ml-1">h</span></div>
            <div class="text-right">
              <svg class="chevron w-6 h-6 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>
          </div>
          ${buildDetails(p)}
        `;
        el.querySelector('.list-row-main').addEventListener('click', function() {
          const parent = this.parentElement;
          const isActive = parent.classList.contains('active');
          document.querySelectorAll('.list-row, .podium-card').forEach(node => node.classList.remove('active'));
          if(!isActive) parent.classList.add('active');
        });
        container.appendChild(el);
      });
    }

    function processRender(data, sortType) {
      let sorted = [...data];
      if (sortType === 'overall') sorted.sort((a, b) => calcScore(b) - calcScore(a));
      else if (sortType === 'wins') sorted.sort((a, b) => (b.totalWins ?? 0) - (a.totalWins ?? 0));
      else if (sortType === 'hours') sorted.sort((a, b) => (b.hoursPlayed ?? 0) - (a.hoursPlayed ?? 0));
      else if (sortType === 'knobs') sorted.sort((a, b) => (b.totalKnobs ?? 0) - (a.totalKnobs ?? 0));

      const isSearching = document.getElementById('searchInput').value.trim().length > 0;

      if (!isSearching && sorted.length >= 3 && (sortType === 'overall' || sortType === 'wins')) {
        document.getElementById('podiumArea').style.display = 'grid';
        renderPodium(sorted.slice(0, 3));
        renderList(sorted.slice(3), 3);
      } else {
        document.getElementById('podiumArea').style.display = 'none';
        renderList(sorted, 0);
      }
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      const filtered = playersData.filter(p => p.name.toLowerCase().includes(q));
      processRender(filtered, document.getElementById('sortSelect').value);
    });

    document.getElementById('sortSelect').addEventListener('change', (e) => {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const filtered = playersData.filter(p => p.name.toLowerCase().includes(q));
      processRender(filtered, e.target.value);
    });

    processRender(playersData, 'overall');
  </script>
</body>
</html>
